<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">

<center>
<body>
    <h1>STUDENT APPLICATION FORM</h1>
    <form for="structre">
        <label for="identify">Name:</label>
        <input type="text" placeholder="Enter your name"><br>

        <label>Date of Birth:</label>
        <input type="date" name="Date of Birth"><br>

        <label>Contact Number:</label>
        <input type="text" name="Contact Number" placeholder=" Enter your Contact Number"><br>

        <label>Email ID:</label>
        <input type="text" name="Email ID" placeholder="Enter your Email" /required> <br>

        <label>Permanent Address:</label>
        <input type="text" name="Permanent Address" placeholder="Enter your Permanent Address"><br>
        
        <label>Current Address:</label>
        <input type="text" name="Current Address" placeholder="Enter your Current Address"><br>

        <label> Gender:</label><br>
        <label>Male</label><input type="radio" value="Male">

        <label>Female<input type="radio" value="Female"></label>

        <label>Other<input type="radio" value="Other"></label><br>

        <label>Upload Your Mark Sheet</label>
        <input type="file" name="Mark Sheet">
        <button>SUBMIT</button>
    </form>
</body>
