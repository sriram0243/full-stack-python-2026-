<!DOCTYPE html>
<html>
<head>
    <title>Student List</title>
</head>
<body>

    <h2>All Students</h2>

    <table border="1">
        <tr>
            <th>ID</th>
            <th>Name</th>

        </tr>

        {% for student in students %}
        <tr>
            <td>{{ student[0] }}</td>
            <td>{{ student[1] }}</td>
        </tr>
        {% endfor %}

    </table>

    <br>
    <a href="/">Add More</a>

</body>
</html>
